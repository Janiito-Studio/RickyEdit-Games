<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rickyedit Games - Nos hemos mudado!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="icon" href="Avatar%20Rickyedit.jpg" type="image/jpeg" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #18191c;
            --card: rgba(34, 35, 41, 0.78);
            --card-strong: #222329;
            --dark: #0d0d10;
            --pink: #ff33cc;
            --pink-2: #ff168c;
            --yellow: #f1c40f;
            --cyan: #38d4ff;
            --green: #36e28a;
            --text: #fff;
            --muted: #b9bbbe;
            --line: rgba(255, 255, 255, 0.1);
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d0d10; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 51, 204, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 51, 204, 0.7); }
        * { scrollbar-width: thin; scrollbar-color: rgba(255, 51, 204, 0.5) #0d0d10; }

        body {
            min-height: 100vh;
            font-family: Outfit, system-ui, sans-serif;
            background:
                linear-gradient(135deg,
                    rgba(255, 51, 204, 0.15),
                    transparent 32rem),
                var(--bg);
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: linear-gradient(90deg, var(--pink-2), var(--pink));
            padding: 8px clamp(16px, 4vw, 44px);
            min-height: 62px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 30px rgba(255, 51, 204, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            width: min(220px, 48vw);
            max-height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.55));
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .arcade-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            max-width: 520px;
            width: 100%;
        }

        .arcade-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(255, 51, 204, 0.15);
            border-color: rgba(255, 51, 204, 0.25);
        }

        .card-image-header {
            height: 180px;
            width: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(255, 51, 204, 0.06) 0%, rgba(0, 0, 0, 0.35) 100%);
            border-bottom: 1px solid var(--line);
            border-radius: 24px 24px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon-img {
            max-height: 110px;
            width: auto;
            object-fit: contain;
            border-radius: 50%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px var(--pink));
        }

        .arcade-card:hover .card-icon-img {
            transform: scale(1.15) rotate(3deg);
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between;
        }

        .card-badge {
            align-self: flex-start;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 99px;
            margin-bottom: 14px;
            background: rgba(255, 51, 204, 0.15);
            color: var(--pink);
            border: 1px solid rgba(255, 51, 204, 0.3);
        }

        .card-body h2 {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-body p {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .card-action {
            font-weight: 900;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--pink);
            transition: gap 0.2s ease;
        }

        .arcade-card:hover .card-action {
            gap: 12px;
        }

        footer {
            margin-top: 42px;
            padding: 38px 18px 52px;
            background: #111214;
            text-align: center;
        }

        footer p {
            margin: 0;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-container">
            <img class="nav-logo" src="Rickyedit%20Games.png" alt="Rickyedit Games" />
        </div>
    </header>

    <main>
        <a href="https://rickyeditgames.eloygm.com/" class="arcade-card" target="_blank" rel="noopener">
            <div class="card-image-header">
                <img class="card-icon-img" src="Avatar%20Rickyedit.jpg" alt="Rickyedit">
            </div>
            <div class="card-body">
                <div>
                    <span class="card-badge">Aviso</span>
                    <h2>Nos hemos mudado!</h2>
                    <p>Debido a problemas, he decidido que <strong style="color:#fff">nos pasamos a una nueva web</strong>.
                        Todos los juegos y todo el contenido estan ahora en el nuevo sitio. Siento las molestias.</p>
                </div>
                <div class="card-action">
                    IR A LA NUEVA WEB
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </div>
        </a>
    </main>

    <footer>
        <p>Rickyedit Games &copy; 2026 &mdash; Hecho por Jan (Discord: .janiito | Twitch: jasanzo)</p>
    </footer>
</body>

</html>
