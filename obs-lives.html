<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rickyedit - Vidas OBS</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui;
        }
        #obs-lives {
            display: flex;
            gap: 10px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.6));
        }
        #obs-lives img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
            transition: opacity 0.3s ease;
            animation: heart-wave 1.8s ease-in-out infinite;
            will-change: transform;
            backface-visibility: hidden;
        }
        #obs-lives img.lost {
            opacity: 0.4;
            filter: grayscale(0.5);
        }
        #obs-logo {
            text-align: center;
        }
        #obs-logo img {
            height: 200px;
            object-fit: contain;
            opacity: 0.8;
            filter: drop-shadow(0 0 8px rgba(255, 51, 204, 0.5));
            animation: logo-float 4s linear infinite;
            will-change: transform;
        }
        @keyframes heart-wave {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -12px, 0); }
        }
        @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div id="obs-lives"></div>
    <div id="obs-logo" style="display:none;"></div>
    <script>
        var GAME_PATH = 'Iconos RickyEdit Web/';
        var FIREBASE_URL = 'https://rickyedit-notifications-default-rtdb.firebaseio.com';
        var params = new URLSearchParams(window.location.search);
        var playerId = params.get('id');
        var lastData = null;

        function updateDisplay(data) {
            var el = document.getElementById('obs-lives');
            var logo = document.getElementById('obs-logo');
            if (!data) {
                el.style.display = 'none';
                if (!logo.querySelector('img')) {
                    logo.style.display = 'block';
                    logo.innerHTML = '<img src="Rickyedit%20Games.png" alt="Rickyedit Games">';
                }
                return;
            }
            el.style.display = 'flex';
            logo.style.display = 'none';
            logo.innerHTML = '';
            var lives, maxLives;
            if (typeof data === 'string') {
                try { var p = JSON.parse(data); lives = p.lives; maxLives = p.max; }
                catch(e) { lives = parseInt(data || '3', 10); maxLives = 3; }
            } else if (typeof data === 'object' && data !== null) {
                lives = data.lives;
                maxLives = data.max;
            } else {
                lives = 3; maxLives = 3;
            }
            if (isNaN(lives)) lives = 3;
            if (isNaN(maxLives)) maxLives = 3;

            var hearts = el.querySelectorAll('img');
            if (hearts.length !== maxLives) {
                el.innerHTML = '';
                for (var i = 0; i < maxLives; i++) {
                    var img = document.createElement('img');
                    img.src = i < lives ? GAME_PATH + 'Vida Entera.png' : GAME_PATH + 'Vida Rota.png';
                    img.alt = i < lives ? 'Vida' : 'Sin vida';
                    if (i >= lives) img.className = 'lost';
                    img.style.animationDelay = (i * 0.15) + 's';
                    el.appendChild(img);
                }
            } else {
                hearts.forEach(function(img, i) {
                    img.src = i < lives ? GAME_PATH + 'Vida Entera.png' : GAME_PATH + 'Vida Rota.png';
                    img.alt = i < lives ? 'Vida' : 'Sin vida';
                    if (i < lives) img.classList.remove('lost');
                    else img.classList.add('lost');
                });
            }
            lastData = JSON.stringify(data);
        }

        function pollFirebase() {
            if (!playerId) { pollLocalStorage(); return; }
            fetch(FIREBASE_URL + '/leaderboard/obs_lives_' + encodeURIComponent(playerId) + '.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data !== null) updateDisplay(data);
                    else pollLocalStorage();
                })
                .catch(function() { pollLocalStorage(); });
        }

        function pollLocalStorage() {
            try {
                var raw = localStorage.getItem('rlb_obs_lives');
                if (raw && raw !== lastData) updateDisplay(raw);
            } catch(e) {}
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'rlb_obs_lives') updateDisplay(e.newValue);
        });

        setInterval(pollFirebase, 500);
        pollFirebase();
    </script>
</body>
</html>
